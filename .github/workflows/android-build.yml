name: Android APK Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the monorepo source code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Set up Java JDK (Required for Android Gradle)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Node.js (Matching your exact Node 22 runtime)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'

      # 4. Setup pnpm (Matching your exact pnpm v10 workspaces)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      # 5. Install Monorepo Dependencies
      # This installs packages across both your Express backend and your Expo app simultaneously
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      #Restore DEBUG Keystore
      # Add Signature
      - name: Restore debug keystore
        run: |
           mkdir -p ~/.android
           echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > ~/.android/debug.keystore 
           
   # 6. Generate Native Android Directories (The Expo Prebuild Step)
      - name: Expo Prebuild Android
        run: |
          cd artifacts/mobile
          npx expo prebuild --platform android --no-install

      # 7. Compile the Demo APK using Gradle inside the workspace
      - name: Compile Demo APK
        run: |
          cd artifacts/mobile/android
          ./gradlew assembleDebug

      # 8. Upload the compiled .apk file from the artifacts folder
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: care-rewards-demo-apk
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
